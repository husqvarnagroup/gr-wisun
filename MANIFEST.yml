description: |-
  This OOT module implements basic blocks that allow receiving Wi-SUN
  packets, which can be fed into Wireshark. This allows using SDR
  hardware as a Wi-SUN sniffer. At the moment, only 2-FSK modulation
  is supported.
file_format: 1
