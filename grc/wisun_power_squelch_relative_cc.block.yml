id: wisun_power_squelch_relative_cc
label: power_squelch_relative_cc
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.power_squelch_relative_cc(${relative_threshold}, ${alpha})

parameters:
- id: relative_threshold
  label: relative_threshold
  dtype: real
- id: alpha
  label: alpha
  dtype: real
  default: 1e-4

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: stream
  dtype: complex

file_format: 1
