id: wisun_data_whitening_bb
label: data_whitening_bb
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.data_whitening_bb(${packet_tag}, ${header_bits})

parameters:
- id: packet_tag
  label: Packet Tag
  dtype: string
  default: wisun-packet
- id: header_bits
  label: Number of Packet Header Bits
  dtype: int
  default: 32

inputs:
- domain: stream
  dtype: byte

outputs:
- domain: stream
  dtype: byte

file_format: 1
