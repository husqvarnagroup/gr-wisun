id: wisun_baseband_channel_receiver
label: baseband_channel_receiver
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.baseband_channel_receiver(${samples_per_symbol}, ${sfd})

parameters:
- id: samples_per_symbol
  label: Samples per Symbol
  dtype: int
- id: sfd
  label: Start-of-Frame Delimiter
  dtype: int
  default: 0b1001000001001110

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: message
  id: pdus

file_format: 1
