id: wisun_multi_channel_receiver
label: multi_channel_receiver
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.multi_channel_receiver(${sample_rate}, ${center_frequency}, ${channel_0_frequency}, ${channel_spacing}, ${symbol_rate}, ${channels})

parameters:
- id: sample_rate
  label: Sample Rate
  dtype: int
- id: center_frequency
  label: Center Frequency [Hz]
  dtype: int
- id: channel_0_frequency
  label: Channel 0 Frequency [Hz]
  dtype: int
- id: channel_spacing
  label: Channel Spacing [Hz]
  dtype: int
- id: symbol_rate
  label: Symbol Rate
  dtype: int
- id: channels
  label: Channels

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: message
  id: pdus

file_format: 1
