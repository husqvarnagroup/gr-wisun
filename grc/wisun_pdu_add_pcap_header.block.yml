id: wisun_pdu_add_pcap_header
label: Add PCAP header
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.pdu_add_pcap_header(${prepend_global_pcap_header})

parameters:
- id: prepend_global_pcap_header
  label: Prepend global PCAP header
  dtype: bool
  default: 'True'
  options: ['True', 'False']

inputs:
- domain: message
  id: pdus

outputs:
- domain: message
  id: pdus

file_format: 1
