id: wisun_gated_power_squelch_relative_cc
label: gated_power_squelch_relative_cc
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.gated_power_squelch_relative_cc(${relative_threshold}, ${alpha}, ${trailing_samples})

parameters:
- id: relative_threshold
  label: relative_threshold
  dtype: real
- id: alpha
  label: alpha
  dtype: real
  default: 1e-4
- id: trailing_samples
  label: trailing_samples
  dtype: int
  default: 1000

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: stream
  dtype: complex

file_format: 1
