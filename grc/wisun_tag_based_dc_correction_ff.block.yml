id: wisun_tag_based_dc_correction_ff
label: tag_based_dc_correction_ff
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.tag_based_dc_correction_ff(${signal_start_tag}, ${signal_end_tag}, ${estimation_length})

parameters:
- id: signal_start_tag
  label: signal_start_tag
  dtype: string
  default: squelch_sob
- id: signal_end_tag
  label: signal_end_tag
  dtype: string
  default: squelch_eob
- id: estimation_length
  label: estimation_length
  dtype: int

inputs:
- domain: stream
  dtype: float

outputs:
- domain: stream
  dtype: float

file_format: 1
