id: wisun_pdu_add_pcapng_header
label: pdu_add_pcapng_header
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.pdu_add_pcapng_header(${prepend_section_header_block}, ${prepend_interface_description_block}, ${use_tap_dlt})

parameters:
- id: prepend_section_header_block
  label: Prepend section header block (SHB)
  dtype: bool
  default: 'True'
  options: ['True', 'False']
- id: prepend_interface_description_block
  label: Prepend interface description block (IDB)
  dtype: bool
  default: 'True'
  options: ['True', 'False']
- id: use_tap_dlt
  label: Use 802.15.4 TAP data-link type
  dtype: bool
  default: 'True'
  options: ['True', 'False']

inputs:
- domain: message
  id: pdus

outputs:
- domain: message
  id: pdus

file_format: 1
