id: wisun_single_channel_receiver
label: single_channel_receiver
category: '[Wi-SUN]'

templates:
  imports: from gnuradio import wisun
  make: wisun.single_channel_receiver(${sample_rate}, ${frequency_offset}, ${channel_spacing}, ${decimation}, ${samples_per_symbol}, ${gated_power_squelch})

parameters:
- id: sample_rate
  label: Sample Rate
  dtype: int
- id: frequency_offset
  label: Frequency Offset [Hz]
  dtype: int
- id: channel_spacing
  label: Channel Spacing [Hz]
  dtype: int
- id: decimation
  label: Decimation
  dtype: int
- id: samples_per_symbol
  label: Samples per Symbol
  dtype: int
- id: gated_power_squelch
  label: Gated Power Squelch
  dtype: bool

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: message
  id: pdus

file_format: 1
